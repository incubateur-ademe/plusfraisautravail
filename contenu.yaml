  button_restart: "Recommencer"
  button_all_solutions: "Découvrir toutes les solutions"
  all_solutions_url: "https://plusfraisautravail.beta.gouv.fr/agir/"

navigation:
  button_back: "Retour"
  button_back_home: "Retour à l'accueil"
  button_next: "Suivant"
  button_dont_know: "Je ne sais pas"

