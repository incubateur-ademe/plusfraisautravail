welcome:
  title: "Evaluer votre site de travail face à la chaleur"
  lead: "Les vagues de chaleur deviennent de plus en plus fréquentes et intenses. Répondez à 5 questions pour identifier les premières actions permettant d’améliorer les conditions de travail de vos équipes sur votre site."
  callout_title: "Comment fonctionne cet outil ?"
  callout_body: "<strong>5 questions</strong> - <strong>4 leviers d'action</strong> : 🌱 Sols, 💧 Eau de pluie, 🌳 Espaces verts et 🏢 Bâtiments. Choisissez la réponse la plus proche de la situation de votre site de travail. Et vous obtiendrez un aperçu de votre situation et des leviers d’action concrets à actionner."
  callout_duration: "Durée estimée : environ <strong>5 minutes</strong>."
  button_start: "Commencer le questionnaire"
  button_resume: "Reprendre le questionnaire"
  button_restart: "Recommencer depuis le début"
  button_results: "Voir les recommandations"

