themes:
  - id: sol
    label: Désimperméabilisation des sols
    icon: "🌱"
    solutionPageId: 80
    description: "La désimperméabilisation des sols permet de réduire les îlots de chaleur urbains en favorisant l'infiltration de l'eau de pluie et en permettant la végétalisation."

  - id: eaux-pluviales
    label: Eaux pluviales
    icon: "💧"
    solutionPageId: 81
    description: "La valorisation des eaux pluviales contribue au rafraîchissement naturel du site en alimentant le sol et la végétation. De plus elle contribue à réduire les inondations par ruissellement."

  - id: espaces-verts
    label: Îlots de rafraîchissement
    icon: "🌳"
    solutionPageId: 82
    description: "Les espaces verts, notamment les arbres réduisent la température ambiante par évapotranspiration et grâce à leur ombrage, essentiels pour le confort des salariés. Alimentés en eau grâce à une gestion des eaux pluviales adaptée et plantés dans un sol perméable, les espaces verts permettent de créer des îlots de rafraîchissement. Ils accueillent également la biodiversité et stockent du carbone."

  - id: batiments
    label: Bâtiments
    icon: "🏢"
    solutionPageId: 77
    description: "L'adaptation des bâtiments (isolation, protections solaires, systèmes de rafraîchissement) est cruciale pour maintenir des conditions de travail acceptables lors des vagues de chaleur. Les 2 enjeux sont d’empêcher au maximum à la chaleur d’entrer dans le bâtiment puis de pouvoir le rafraîchir avec des solutions efficaces."
