name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  REGISTRY: rg.fr-par.scw.cloud
  REGISTRY_NAMESPACE: pfat-prod
  IMAGE_NAME: api
  REGION: fr-par

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - run: uv python install 3.12
      - working-directory: api
        run: uv sync --extra dev
      - working-directory: api
        run: uv run ruff check .
      - working-directory: api
        run: uv run pytest

  build-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Compute image reference
        id: meta
        run: |
          IMAGE="$REGISTRY/$REGISTRY_NAMESPACE/$IMAGE_NAME:sha-${GITHUB_SHA::12}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Scaleway container redeploy
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          CONTAINER_ID: ${{ vars.SCW_API_CONTAINER_ID }}
          IMAGE: ${{ needs.build-push.outputs.image }}
        run: |
          curl --fail-with-body -X PATCH \
            "https://api.scaleway.com/containers/v1beta1/regions/$REGION/containers/$CONTAINER_ID" \
            -H "X-Auth-Token: $SCW_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"registry_image\": \"$IMAGE\", \"redeploy\": true}"
