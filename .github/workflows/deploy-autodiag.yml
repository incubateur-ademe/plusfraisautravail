name: Deploy autodiag

on:
  push:
    branches:
      - main
    paths:
      - "apps/autodiag/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-autodiag.yml"
  workflow_dispatch:

env:
  BUCKET: pfat-autodiag
  REGION: fr-par
  S3_ENDPOINT: https://s3.fr-par.scw.cloud

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: autodiag
      url: ${{ vars.SITE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build --workspace @pfat/autodiag
        env:
          # Bucket serves at the root, not at a sub-path.
          VITE_BASE_URL: /

      - name: Configure AWS CLI for Scaleway
        run: |
          aws configure set aws_access_key_id "$SCW_ACCESS_KEY"
          aws configure set aws_secret_access_key "$SCW_SECRET_KEY"
          aws configure set default.region "$REGION"
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}

      - name: Sync to bucket
        run: |
          aws --endpoint-url=$S3_ENDPOINT s3 sync \
            apps/autodiag/dist/ s3://$BUCKET/ \
            --delete \
            --cache-control "public, max-age=300"
