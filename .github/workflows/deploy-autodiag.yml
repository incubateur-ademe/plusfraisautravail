name: Deploy autodiag to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/autodiag/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-autodiag.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace @pfat/autodiag
        env:
          VITE_BASE_URL: /plusfraisautravail/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/autodiag/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
