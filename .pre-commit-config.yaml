## Pre-commit hooks for plusfraisautravail
##
## Install once after cloning:    just install-hooks
## Run on every commit (auto)
## Run on the whole tree on demand:  uv run pre-commit run --all-files

repos:
  # ── basic hygiene ─────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        # tsconfig files are JSON-with-comments; the strict JSON parser
        # used by this hook can't handle them.
        exclude: ^.*tsconfig.*\.json$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]

  # ── Python (api/) ─────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^api/
      - id: ruff-format
        files: ^api/

  # ── HCL (infra/) ──────────────────────────────────────────────────
  # Uses the local `tofu` binary so it matches what CI runs.
  - repo: local
    hooks:
      - id: tofu-fmt
        name: tofu fmt
        language: system
        entry: tofu fmt -recursive
        files: \.(tf|tfvars)$
        pass_filenames: false

  # ── secret detection ──────────────────────────────────────────────
  # Catches accidental commits of API keys / tokens before they reach
  # GitHub. ~5s per run; bypass with `git commit --no-verify` if a real
  # false positive blocks you.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
