questions:
  - id: sol
    themeId: sol
    question: "Avez-vous engagé une démarche de désimperméabilisation des sols ?"
    options:
      - score: 0
        label: "100% de mes sols hors bâtiment sont imperméabilisés ou je n'ai pas de foncier"
      - score: 1
        label: "Sensibilisation avec mon agence de l'eau ou une organisation spécialiste (ADOPTA, GRAIE, ...)"
      - score: 2
        label: "Etude de faisabilité programmée ou réalisée"
      - score: 3
        label: "Travaux de désimperméabilisation programmés ou en cours"
      - score: 4
        label: "100% de mes sols sont désimperméabilisés"
      - score: 5
        label: "100% de mes sols sont désimperméabilisés et ma toiture est végétalisée"

  - id: eaux-pluviales
    themeId: eaux-pluviales
    question: "Valorisez-vous vos eaux pluviales ?"
    options:
      - score: 0
        label: "Gestion des eaux pluviales par un réseau d'assainissement"
      - score: 1
        label: "Sensibilisation avec mon agence de l'eau ou une organisation spécialiste (ADOPTA, GRAIE, ...)"
      - score: 2
        label: "Etude de faisabilité de l'infiltration dans les espaces verts programmée ou réalisée"
      - score: 3
        label: "Travaux de végétalisation interceptant les ruissellements"
      - score: 4
        label: "100% des eaux pluviales en gestion intégrée et durable"
      - score: 5
        label: "100% des eaux pluviales en gestion intégrée et durable et 100% de mes sols sont désimperméabilisés"

  - id: espaces-verts
    themeId: espaces-verts
    question: "Comment valorisez-vous vos espaces verts pour créer des îlots de rafraîchissement ?"
    options:
      - score: 0
        label: "Pas d'espaces verts"
      - score: 1
        label: "Espaces verts constitués d'une strate herbacée sans ombrage porté sur les lieux de travail"
      - score: 2
        label: "Etude de faisabilité programmée ou réalisée en lien avec un acteur protégeant la biodiversité (Agences de l'eau, OFB/ARB, conservatoire botanique, LPO, ...) pour végétaliser et rafraîchir la surface du site"
      - score: 3
        label: "Espaces verts en gestion différenciée constitués d'arbres et d'arbustes apportant un ombrage sur les lieux de travail et parking sur moins de 25% de la surface du site"
      - score: 4
        label: "Espaces verts en gestion différenciée constitués d'arbres et d'arbustes apportant un ombrage sur les lieux de travail et parking sur moins de 50% de la surface du site"
      - score: 5
        label: "Espaces verts en gestion différenciée constitués d'arbres et d'arbustes apportant un ombrage sur les lieux de travail et parking sur plus de 50% de la surface du site"

  - id: batiments-1
    themeId: batiments
    question: "Comment réduisez-vous vos besoins en rafraîchissement ?"
    options:
      - score: 0
        label: "Aucune action"
      - score: 1
        label: "Prise d'informations auprès d'un centre de ressources public (ADEME, CSTB, …) ou d'un prestataire privé (Bureau d'études, entreprises, …) et actions de sensibilisation auprès des utilisateurs."
      - score: 2
        label: "Audit thermique programmée ou réalisée"
      - score: 3
        label: "Travaux liés aux protections solaires programmés ou réalisés"
      - score: 4
        label: "Travaux liés aux protections solaires et à l'isolation programmés ou réalisés"
      - score: 5
        label: "Travaux liés aux protections solaires et à l'isolation incluant des solutions fondées sur la nature (toitures et/ou murs végétalisés)"

  - id: batiments-2
    themeId: batiments
    question: "Comment répondez-vous à vos besoins de rafraîchissement ?"
    options:
      - score: 0
        label: "Aucune action"
      - score: 1
        label: "Prise d'informations auprès d'un centre de ressources public (ADEME, CSTB, …) ou d'un prestataire privé (Bureau d'études, entreprises, …) et actions de sensibilisation auprès des utilisateurs."
      - score: 2
        label: "Audit thermique programmée ou réalisée"
      - score: 3
        label: "Travaux liés à la ventilation naturelle programmés ou réalisés"
      - score: 4
        label: "Travaux liés à la ventilation naturelle réalisés et travaux liés aux brasseurs d'air programmés ou réalisés"
      - score: 5
        label: "Travaux liés à un système de rafraîchissement programmés ou réalisés : adiabatique intégré ventilation/CTA, raccordement à un réseau de froid urbain, raccordement à une PAC AIR EAU performante, puits climatique/géocooling"
