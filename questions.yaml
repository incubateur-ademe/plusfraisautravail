questions:
  - id: sol-1
    themeId: sol
    question: "Autour de vos bâtiments, les sols sont-ils plutôt bétonnés ou perméables ?"
    options:
      - score: 0
        label: "La plupart des surfaces sont bétonnées ou goudronnées (cour, parking…)."
      - score: 2.5
        label: "Il y a à la fois des surfaces bétonnées/goudronnées et des zones perméables (espaces verts, béton poreux…)."
      - score: 5
        label: "La majorité des sols sont perméables, et l’eau de pluie peut s’infiltrer."

  - id: sol-2
    themeId: sol
    question: "Avez-vous déjà agi pour rendre certains sols plus perméables ?"
    options:
      - score: 0
        label: "Non, rien n’a été fait pour le moment."
      - score: 1.25
        label: "Oui, on y réfléchit ou on a commencé à se renseigner (étude de faisabilité programmée ou en cours, ADOPTA, GRAIE...)."
      - score: 2.5
        label: "Oui, des actions sont prévues (travaux programmés ou en cours…)."
      - score: 5
        label: "Oui, des aménagements ont déjà été réalisés."

  - id: eaux-pluviales-1
    themeId: eaux-pluviales
    question: "Quand il pleut, que devient l’eau de pluie sur votre site ?"
    options:
      - score: 0
        label: "Elle est principalement évacuée vers le réseau d’assainissement (canalisations, égouts…)."
      - score: 2.5
        label: "Une partie est évacuée dans le réseau d’assainissement, une autre s’infiltre sur place."
      - score: 5
        label: "Elle s’infiltre majoritairement sur place (espaces verts, chaussées perméables…)."
        
   - id: eaux-pluviales-2
    themeId: eaux-pluviales
    question: "Avez-vous déjà mis en place des solutions pour mieux gérer l’eau de pluie ?"
    options:
      - score: 0
        label: "Non, rien n’a été fait pour le moment."
      - score: 1.25
        label: "Oui, on y réfléchit ou on a commencé à se renseigner (agence de l’eau, ADOPTA, GRAIE…)."
      - score: 2.5
        label: "Oui, des actions sont prévues (travaux de végétalisation interceptant les ruissellements prévus ou en cours…)."
      - score: 5
        label: "Oui, des aménagements ont déjà été réalisés (travaux de végétalisation interceptant les ruissellements déjà réalisés…)."  

    - id: eaux-pluviales-3
    themeId: eaux-pluviales
    question: "Récupérez-vous l’eau de pluie pour des usages sur votre bâtiment (arrosage, nettoyage de l’unité de production…) ?"
    options:
      - score: 0
        label: "Non"
      - score: 2.5
        label: "Oui, en partie"
      - score: 5
        label: "Oui, de manière régulière"

  - id: espaces-verts-1
    themeId: espaces-verts
    question: "Autour de vos bâtiments, avez-vous des espaces végétalisés ?"
    options:
      - score: 0
        label: "Il n’y a pas d’espaces verts."
      - score: 1.25
        label: "Il y a des espaces verts, mais ils sont surtout composés d’herbe."
      - score: 3.75
        label: "Il y a des arbres ou arbustes."
        
  - id: espaces-verts-2
    themeId: espaces-verts
    question: "Est ce que la végétation (notamment arbres et arbustes) apporte de l’ombre dans  les zones où travaillent vos équipes (postes, pauses, parkings…) ?"
    options:
      - score: 0
