questions:
  - id: sol
    themeId: sol
    question: "Avez-vous engagé une démarche de désimperméabilisation des sols ?"
    options:
      - score: 0
        label: "100% de mes sols hors bâtiment sont imperméabilisés ou je n'ai pas de foncier"
      - score: 1
        label: "Sensibilisation avec mon agence de l'eau ou une organisation spécialiste (ADOPTA, GRAIE, ...)"
      - score: 2
        label: "Etude de faisabilité programmée ou réalisée"
      - score: 3
        label: "Travaux de désimperméabilisation programmés ou en cours"
      - score: 4
        label: "100% de mes sols sont désimperméabilisés"
      - score: 5
        label: "100% de mes sols sont désimperméabilisés et ma toiture est végétalisée"

  - id: eaux-pluviales
    themeId: eaux-pluviales
    question: "Valorisez-vous vos eaux pluviales ?"
    options:
      - score: 0
        label: "Gestion des eaux pluviales par un réseau d'assainissement"
      - score: 1
        label: "Sensibilisation avec mon agence de l'eau ou une organisation spécialiste (ADOPTA, GRAIE, ...)"
      - score: 2
        label: "Etude de faisabilité de l'infiltration dans les espaces verts programmée ou réalisée"
      - score: 3
        label: "Travaux de végétalisation interceptant les ruissellements"
      - score: 4
        label: "100% des eaux pluviales en gestion intégrée et durable"
      - score: 5
        label: "100% des eaux pluviales en gestion intégrée et durable et 100% de mes sols sont désimperméabilisés"

  - id: espaces-verts
    themeId: espaces-verts
    question: "Comment valorisez-vous vos espaces verts pour créer des îlots de rafraîchissement ?"
    options:
      - score: 0
        label: "Pas d'espaces verts"
      - score: 1
        label: "Espaces verts constitués d'une strate herbacée sans ombrage porté sur les lieux de travail"
      - score: 2
        label: "Etude de faisabilité programmée ou réalisée en lien avec un acteur protégeant la biodiversité (Agences de l'eau, OFB/ARB, conservatoire botanique, LPO, ...) pour végétaliser et rafraîchir la surface du site"
      - score: 3
        label: "Espaces verts en gestion différenciée constitués d'arbres et d'arbustes apportant un ombrage sur les lieux de travail et parking sur moins de 25% de la surface du site"
      - score: 4
        label: "Espaces verts en gestion différenciée constitués d'arbres et d'arbustes apportant un ombrage sur les lieux de travail et parking sur moins de 50% de la surface du site"
      - score: 5
        label: "Espaces verts en gestion différenciée constitués d'arbres et d'arbustes apportant un ombrage sur les lieux de travail et parking sur plus de 50% de la surface du site"

  - id: batiments-1
    themeId: batiments
    question: "Aujourd’hui, comment empêchez-vous la chaleur de rentrer dans votre bâtiment ?"
    options:
      - score: 0
        label: "Rien n’a été engagé pour le moment"
      - score: 1
        label: "Des premières réflexions sont en cours (recherche d’infos, échanges avec des acteurs public ou privés)"
      - score: 2
        label: "Un audit thermique a été réalisé (ou est en cours)"
      - score: 3
        label: "Des travaux/aménagements sont programmés (ex : protections solaires, isolation…)"
      - score: 4
        label: "Des travaux/aménagement sont déjà en place (ex : protections solaires, isolation…)"
      - score: 5
        label: "Plusieurs types d’aménagements sont en place pour limiter la chaleur (protections solaires, isolation…), incluant des solutions fondées sur la nature (toiture et/ou murs végétalisé…)"

  - id: batiments-2
    themeId: batiments
    question: "Comment rafraîchissez-vous votre ambiance de travail à l’intérieur de votre bâtiment ?"
    options:
      - score: 0
        label: "Rien n’a été engagé pour le moment"
      - score: 1.25
        label: "Le sujet est en cours d’exploration (recherche d’informations, échanges…) auprès d’un centre de ressources public (ADEME, CSTB…) ou d'un prestataire privé (Bureau d'études, entreprise …) et sensibilisation des équipes"
      - score: 2.5
        label: "Des travaux pour rafraîchir mes ambiances de travail sont programmés"
      - score: 5
        label: "Des travaux  pour rafraîchir mes ambiances de travail sont déjà en place"

  - id: batiments-3
    themeId: batiments
    question: "Quelle solution prévoyez-vous d’utiliser pour le rafraîchissement ?"
    options:
      - score: 1.25
        label: "Ventilation naturelle"
      - score: 1.25
        label: "Brasseurs d’air"
      - score: 2.5
        label: "Système de rafraichissement actif (rafraîchissement adiabatique, réseau de froid, PAC air/eau performante, géocooling…)"
      - score: 0.5
        label: "Système de climatisation conventionnelle"

  - id: batiments-4
    themeId: batiments
    question: "Quelle solution utillisez-vous pour le rafraîchissement ?"
    options:
      - score: 1.25
        label: "Ventilation naturelle"
      - score: 1.25
        label: "Brasseurs d’air"
      - score: 2.5
        label: "Système de rafraichissement actif (rafraîchissement adiabatique, réseau de froid, PAC air/eau performante, géocooling…)"
      - score: 0.5
        label: "Système de climatisation conventionnelle"
