<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alert widget embed - sans DSFR</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; }
    .wrapper { background: white; padding: 2rem; border-radius: 8px; max-width: 900px; margin: 0 auto; }
    h1 { color: #333; margin-bottom: 0.5rem; }
    p.lead { color: #666; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Page parente (sans DSFR)</h1>
    <p class="lead">Le script doit injecter la CSS DSFR depuis le CDN unpkg.</p>

    <div id="pfat-alert-widget"></div>

    <script src="/alert-widget-embed.js"></script>
    <script>
      // ?api=https://... overrides the default; defaults to the deployed prod API.
      // Use ?api=http://localhost:8080 to test against a local API.
      var apiBaseUrl = new URLSearchParams(location.search).get('api')
        || 'https://apiprodff018daa-api-prod.functions.fnc.fr-par.scw.cloud';
      window.PfatAlertWidget.mount({
        target: '#pfat-alert-widget',
        apiBaseUrl: apiBaseUrl,
      });
    </script>
  </div>
</body>
</html>
